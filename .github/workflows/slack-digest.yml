name: Slack Digest

on:
  schedule:
    # 오후 7시 KST (UTC 10시) — 하루 1회 발송
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Report mode (morning/afternoon/evening)'
        required: false
        default: 'morning'

# 같은 모드의 중복 실행 방지 (대기 중인 동일 워크플로우는 취소)
concurrency:
  group: slack-digest-${{ github.event.schedule || github.event.inputs.mode || 'manual' }}
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Determine mode
        id: mode
        run: |
          if [ -n "${{ github.event.inputs.mode }}" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=evening" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Slack digest
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: npx tsx scripts/slack-digest.ts ${{ steps.mode.outputs.mode }}
