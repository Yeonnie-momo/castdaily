name: Slack Digest

on:
  schedule:
    # 오전 9시 KST (UTC 0시)
    - cron: '0 0 * * *'
    # 오후 2시 KST (UTC 5시)
    - cron: '0 5 * * *'
    # 오후 7시 KST (UTC 10시)
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Report mode (morning/afternoon/evening)'
        required: false
        default: 'morning'

# 같은 모드의 중복 실행 방지 (대기 중인 동일 워크플로우는 취소)
concurrency:
  group: slack-digest-${{ github.event.schedule || github.event.inputs.mode || 'manual' }}
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Determine mode
        id: mode
        run: |
          # 수동 실행 시 입력값 우선
          if [ -n "${{ github.event.inputs.mode }}" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # GitHub Actions cron 지연 시에도 항상 동일 모드가 나오도록
          # wall-clock이 아닌 트리거된 cron 식 자체로 모드 결정
          case "${{ github.event.schedule }}" in
            "0 0 * * *")  echo "mode=morning"   >> "$GITHUB_OUTPUT" ;;
            "0 5 * * *")  echo "mode=afternoon" >> "$GITHUB_OUTPUT" ;;
            "0 10 * * *") echo "mode=evening"   >> "$GITHUB_OUTPUT" ;;
            *)            echo "mode=morning"   >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Send Slack digest
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: npx tsx scripts/slack-digest.ts ${{ steps.mode.outputs.mode }}
